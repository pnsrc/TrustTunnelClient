name: Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 0.3.0)'
        required: false
        default: '0.10'

env:
  CONAN_VER: "2.12"
  QT_VERSION: "6.7.2"

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Update submodules
        run: git submodule update --init --recursive --remote

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="${{ github.event.inputs.version }}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build tools
        shell: pwsh
        run: |
          choco install ninja nsis -y
          python -m pip install --upgrade pip
          python -m pip install conan~=$env:CONAN_VER

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          modules: 'qt5compat'

      - name: Download Wintun
        shell: pwsh
        run: |
          $wintunUrl = 'https://www.wintun.net/builds/wintun-0.14.1.zip'
          $zipPath = Join-Path $Env:RUNNER_TEMP 'wintun.zip'
          Invoke-WebRequest -Uri $wintunUrl -OutFile $zipPath
          $extractDir = Join-Path $Env:RUNNER_TEMP 'wintun'
          Expand-Archive -Force -Path $zipPath -DestinationPath $extractDir
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Copy-Item -Force (Join-Path $extractDir 'wintun/bin/amd64/wintun.dll') build/
          Copy-Item -Force (Join-Path $extractDir 'wintun/LICENSE.txt') build/WINTUN_LICENSE.txt

      - name: Fix MSYS2 link shadowing MSVC
        shell: pwsh
        run: |
          # Conan recipes run nmake under bash, which finds /usr/bin/link
          # (Unix coreutil) instead of MSVC link.exe. Rename it.
          $msysLink = "C:\Program Files\Git\usr\bin\link.exe"
          if (Test-Path $msysLink) {
            Rename-Item $msysLink "link.exe.bak" -Force
            Write-Host "Renamed $msysLink to avoid shadowing MSVC link.exe"
          }

      - name: Bootstrap Conan dependencies
        shell: cmd
        run: python scripts/bootstrap_conan_deps.py

      - name: Configure
        shell: cmd
        run: |
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
            -DBUILD_TRUSTTUNNEL_QT=ON ^
            -DDISABLE_HTTP3:BOOL=ON ^
            -DCMAKE_DISABLE_FIND_PACKAGE_quiche=ON

      - name: Build
        shell: cmd
        run: cmake --build build --target trusttunnel-qt -j 4

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          # Ninja (single-config) puts exe directly in target dir
          $exe = "build/trusttunnel-qt/trusttunnel-qt.exe"
          if (!(Test-Path $exe)) {
            # Fallback for multi-config generators
            $exe = "build/trusttunnel-qt/RelWithDebInfo/trusttunnel-qt.exe"
          }
          if (!(Test-Path $exe)) {
            Write-Error "Cannot find trusttunnel-qt.exe"
            Get-ChildItem -Recurse build/trusttunnel-qt/ -Filter *.exe |
              ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          $deployDir = Split-Path $exe
          windeployqt6 --release --no-translations --no-opengl-sw $exe
          # Copy WinTUN driver DLL next to the exe
          if (Test-Path "build/wintun.dll") {
            Copy-Item "build/wintun.dll" $deployDir
          }
          if (Test-Path "build/WINTUN_LICENSE.txt") {
            Copy-Item "build/WINTUN_LICENSE.txt" $deployDir
          }
          Write-Host "Deployed to $deployDir"
          echo "DEPLOY_DIR=$deployDir" >> $env:GITHUB_ENV

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          # Resolve to absolute path so NSIS finds files regardless of cwd
          $buildDir = (Resolve-Path $env:DEPLOY_DIR).Path
          $nsis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (!(Test-Path $nsis)) {
            $nsis = "$env:ProgramFiles\NSIS\makensis.exe"
          }
          Write-Host "Using NSIS: $nsis"
          Write-Host "BUILD_DIR: $buildDir"
          Push-Location trusttunnel-qt
          & $nsis /DPRODUCT_VERSION=$ver /DBUILD_DIR="$buildDir" win\installer.nsi
          Pop-Location
          # NSIS writes OutFile relative to the .nsi script location (win/)
          Move-Item "trusttunnel-qt\win\TrustTunnel-$ver-Setup.exe" .

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrustTunnel-${{ steps.version.outputs.version }}-Setup
          path: TrustTunnel-${{ steps.version.outputs.version }}-Setup.exe

  release:
    needs: build-installer
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: TrustTunnel ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
