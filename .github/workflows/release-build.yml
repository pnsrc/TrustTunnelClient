name: Release Qt Client

on:
  push:
    tags:
      - 'v*'

env:
  CONAN_VER: 2.12
  DISABLE_HTTP3: "1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Update submodules to tracked branches
        run: git submodule update --init --recursive --remote

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            qt6-base-dev qt6-base-dev-tools qt6-tools-dev qt6-tools-dev-tools \
            libgl1-mesa-dev libglu1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-xinerama0 libxcb-cursor0
          pip install conan~=${CONAN_VER}

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install ninja qt@6
          echo "/opt/homebrew/opt/qt@6/bin" >> $GITHUB_PATH
          echo "Qt6_DIR=/opt/homebrew/opt/qt@6/lib/cmake/Qt6" >> $GITHUB_ENV
          pip install conan~=${CONAN_VER}
        env:
          HOMEBREW_NO_INSTALL_CLEANUP: 1

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install ninja -y
          python -m pip install --upgrade pip
          python -m pip install conan~=$env:CONAN_VER

      - name: Set up MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt (Windows)
        if: matrix.os == 'windows-latest'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          cache: true
          modules: 'qt5compat'

      - name: Download Wintun (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $wintunUrl = 'https://www.wintun.net/builds/wintun-0.14.1.zip'
          $zipPath = Join-Path $Env:RUNNER_TEMP 'wintun.zip'
          Invoke-WebRequest -Uri $wintunUrl -OutFile $zipPath
          $extractDir = Join-Path $Env:RUNNER_TEMP 'wintun'
          Expand-Archive -Force -Path $zipPath -DestinationPath $extractDir
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Copy-Item -Force (Join-Path $extractDir 'wintun/bin/amd64/wintun.dll') build/
          Copy-Item -Force (Join-Path $extractDir 'wintun/LICENSE.txt') build/WINTUN_LICENSE.txt

      - name: Fix MSYS2 link shadowing MSVC (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $msysLink = "C:\Program Files\Git\usr\bin\link.exe"
          if (Test-Path $msysLink) {
            Rename-Item $msysLink "link.exe.bak" -Force
            Write-Host "Renamed $msysLink to avoid shadowing MSVC link.exe"
          }

      - name: Bootstrap Conan dependencies
        shell: bash
        run: |
          python3 ./scripts/bootstrap_conan_deps.py

      - name: Configure (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          DISABLE_HTTP3=1 make -C trusttunnel-qt configure QT_DISABLE_HTTP3=ON
        env:
          CMAKE_PREFIX_PATH: ${{ matrix.os == 'macos-latest' && '/opt/homebrew/opt/qt@6' || '' }}

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          set DISABLE_HTTP3=1
          make -C trusttunnel-qt configure QT_DISABLE_HTTP3=ON

      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: DISABLE_HTTP3=1 make -C trusttunnel-qt build QT_DISABLE_HTTP3=ON JOBS=4
        env:
          CMAKE_PREFIX_PATH: ${{ matrix.os == 'macos-latest' && '/opt/homebrew/opt/qt@6' || '' }}

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          set DISABLE_HTTP3=1
          make -C trusttunnel-qt build QT_DISABLE_HTTP3=ON JOBS=4

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Package: Linux ─────────────────────────────────────────
      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          VER=${{ steps.version.outputs.version }}
          mkdir -p dist
          BIN=build/trusttunnel-qt/trusttunnel-qt
          if [ ! -f "$BIN" ]; then
            BIN=$(find build -name trusttunnel-qt -type f ! -name '*.o' | head -1)
          fi
          cp "$BIN" dist/
          strip dist/trusttunnel-qt
          cp LICENSE dist/
          tar czf TrustTunnel-${VER}-linux-x86_64.tar.gz -C dist .

      # ── Package: macOS ──────────────────────────────────────────
      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          VER=${{ steps.version.outputs.version }}
          APP=build/trusttunnel-qt/trusttunnel-qt.app
          DEPLOYQT=$(command -v macdeployqt || echo /opt/homebrew/opt/qt@6/bin/macdeployqt)
          if [ -d "$APP" ]; then
            "$DEPLOYQT" "$APP" -dmg
            mv build/trusttunnel-qt/trusttunnel-qt.dmg \
               TrustTunnel-${VER}-macos.dmg
          else
            # Fallback: plain binary archive
            mkdir -p dist
            BIN=$(find build -name trusttunnel-qt -type f | head -1)
            cp "$BIN" dist/
            cp LICENSE dist/
            tar czf TrustTunnel-${VER}-macos-arm64.tar.gz -C dist .
          fi

      # ── Package: Windows ────────────────────────────────────────
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          # Ninja (single-config) puts exe directly in target dir
          $exe = "build/trusttunnel-qt/trusttunnel-qt.exe"
          if (!(Test-Path $exe)) {
            # Multi-config generators (MSVC) use a config subdirectory
            $exe = "build/trusttunnel-qt/RelWithDebInfo/trusttunnel-qt.exe"
          }
          if (!(Test-Path $exe)) {
            # Last resort: search recursively
            $found = Get-ChildItem -Recurse build/ -Filter trusttunnel-qt.exe | Select-Object -First 1
            if ($found) { $exe = $found.FullName }
            else { throw "Cannot find trusttunnel-qt.exe" }
          }
          $deployDir = "dist-win"
          New-Item -ItemType Directory -Force $deployDir | Out-Null
          Copy-Item $exe $deployDir
          Copy-Item LICENSE $deployDir
          # WinTUN driver DLL — required for TUN mode on Windows
          if (Test-Path "build/wintun.dll") {
            Copy-Item "build/wintun.dll" $deployDir
          }
          if (Test-Path "build/WINTUN_LICENSE.txt") {
            Copy-Item "build/WINTUN_LICENSE.txt" $deployDir
          }
          windeployqt6 --release --no-translations --no-opengl-sw "$deployDir\trusttunnel-qt.exe"
          Compress-Archive -Path "$deployDir\*" `
            -DestinationPath "TrustTunnel-$ver-windows-x86_64.zip"

      - name: Upload release asset
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            TrustTunnel-*.tar.gz
            TrustTunnel-*.dmg
            TrustTunnel-*.zip

  release:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TrustTunnelClient ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
